---
name: CI Release

# yamllint disable-line rule:truthy
on:
  workflow_call:
    inputs:
      artifacts:
        type: string
        required: false
        default: CHANGELOG.md
      licensed-files:
        type: string
        required: false
        default: LICENSE

jobs:
  ci-release:
    name: ci-release
    runs-on: ubuntu-latest
    # trunk-ignore(checkov/CKV2_GHA_1)
    permissions:
      pull-requests: write
      contents: write
    if: >-
      github.actor != 'dependabot[bot]' &&
      github.ref_name == 'main'
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GHA_CLIENT_ID }}
          private-key: ${{ secrets.GHA_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Update License year
        uses: FantasticFiasco/action-update-license-year@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          assignees: jlec
          labels: license,year
          path: ${{ inputs.licensed-files }}
        id: license
      - name: Merge Year Bump PR
        if: steps.license.outputs.pullRequestNumber != ''
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: >-
          gh pr merge --rebase
          --delete-branch ${{ steps.license.outputs.pullRequestNumber }}
      - name: Reset branch to main
        run: git checkout main && git reset --hard origin/main
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Lock uv
        run: uv lock
      - name: Create bump and changelog
        id: cz
        uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff # 0.27.1
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          increment: PATCH
          changelog_increment_filename: body.md

      - name: "Check file existence"
        id: check_files
        uses: andstor/file-existence-action@v3
        with:
          files: "galaxy.yml, meta/runtime.yml"

      - name: Build Ansible Collection
        uses: artis3n/ansible_galaxy_collection@ffbca2460a5a1c600b941bbf1536bd61de1c2227 # v3.0.0
        if: steps.check_files.outputs.files_exists == 'true'
        with:
          api_key: "FAKE_KEY"
          publish: false

      - name: Release on Github w/ files
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ inputs.artifacts }}
          body_path: "body.md"
          tag_name: ${{ env.REVISION }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Print Version
        run: echo "Bumped to version ${{ steps.cz.outputs.version }}"
