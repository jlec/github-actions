---
name: GO Build & test

# yamllint disable-line rule:truthy
on:
  workflow_call: {}

jobs:
  go-build-test:
    name: go-build-test
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.GHA_CLIENT_ID }}
          private-key: ${{ secrets.GHA_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: >-
          git config --global
          url.'https://jlec:${{ steps.app-token.outputs.token }}@github.com/'.insteadOf https://github.com/
      # yamllint disable-line rule:line-length
      - run: >-
          git config --global
          url.'https://jlec:${{ steps.app-token.outputs.token }}@github.com/'.insteadOf 'https://github.com/'
      - run: "git config --global url.'https://'.insteadOf git://"
      - run: "git config --global user.name jlec"
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          cache: true
          go-version: ">=1.26.0"
      - name: GO Build
        run: go build -v ./...
      - name: GO Test
        run: go test -v ./...
      - name: GO vet
        run: go vet ./...
      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1.4.1
        with:
          install-go: false
          min-go-version: 1.26.0
